name: EAS Submit (App Store)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to submit
        required: true
        default: ios
        type: choice
        options: [ios, android]

jobs:
  submit:
    name: Submit to ${{ github.event.inputs.platform == 'ios' && 'App Store' || 'Play Store' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build production
        run: |
          eas build \
            --profile production \
            --platform ${{ github.event.inputs.platform }} \
            --non-interactive

      - name: Submit to store
        run: |
          eas submit \
            --profile production \
            --platform ${{ github.event.inputs.platform }} \
            --non-interactive
